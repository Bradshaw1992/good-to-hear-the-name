<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f7a3e">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="GTHN">
<title>It's good to hear the name — Wordle for niche footballers</title>
<style>
  :root {
    --bg: #f4efe6;
    --card: #ffffff;
    --card-hover: #f8f5ee;
    --line: #e6dfd0;
    --text: #14202e;
    --text-soft: #3a4858;
    --muted: #8a8676;
    --accent: #0f7a3e;
    --accent-soft: #d6ede0;
    --bad: #b03434;
    --bad-soft: #f5e1de;
    --good: #0f7a3e;
    --good-soft: #d6ede0;
    --shadow: 0 1px 2px rgba(20,32,46,0.04), 0 4px 14px rgba(20,32,46,0.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; min-height: 100dvh; }

  .app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 18px 16px 32px;
  }

  header {
    text-align: center;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line);
  }
  header .brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
  }
  header .brand-icon {
    width: 28px; height: 28px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    box-shadow: 0 2px 6px rgba(15, 122, 62, 0.3);
  }
  header h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  header .sub-row {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-top: 6px;
  }
  header .day-badge {
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 3px 9px;
    border-radius: 999px;
  }
  header .date {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr;
    gap: 18px;
  }
  @media (min-width: 820px) {
    .layout { grid-template-columns: 1.05fr 1fr; align-items: start; }
  }

  .image-card {
    background: var(--card);
    border-radius: 18px;
    overflow: hidden;
    position: relative;
    box-shadow: var(--shadow);
    max-height: 60vh;
    /* aspect-ratio set dynamically via JS based on the silhouette's natural dimensions */
  }
  .image-card img {
    width: 100%; height: 100%; object-fit: cover; object-position: center;
    display: block;
    transition: opacity 700ms ease;
  }
  .image-card .photo { position: absolute; inset: 0; opacity: 0; }
  .image-card.revealed .photo { opacity: 1; }

  .game {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .question {
    background: var(--card);
    border-radius: 16px;
    padding: 18px 20px;
    box-shadow: var(--shadow);
    border-left: 3px solid var(--accent);
  }
  .question .label {
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin-bottom: 8px;
    font-weight: 700;
  }
  .question .text {
    font-size: 17px;
    line-height: 1.5;
    color: var(--text);
  }

  .input-wrap { position: relative; }
  input[type="text"] {
    width: 100%;
    background: var(--card);
    color: var(--text);
    border: 1.5px solid var(--line);
    border-radius: 14px;
    padding: 14px 18px;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    box-shadow: var(--shadow);
    transition: border-color 150ms ease;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }
  input[type="text"]:disabled { opacity: 0.5; }

  .suggestions {
    margin-bottom: 8px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    overflow-y: auto;
    box-shadow: var(--shadow);
    /* Smooth in/out: fade + collapse instead of abrupt display:none */
    max-height: 0;
    opacity: 0;
    border-width: 0;
    transition: max-height 200ms ease, opacity 150ms ease, border-width 0ms 200ms;
  }
  .suggestions.open {
    max-height: 320px;
    opacity: 1;
    border-width: 1px;
    transition: max-height 200ms ease, opacity 150ms ease, border-width 0ms;
  }
  .suggestion {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    user-select: none;
    transition: background 100ms ease;
  }
  .suggestion:last-child { border-bottom: none; }
  .suggestion:hover, .suggestion:focus { background: var(--card-hover); }
  .suggestion .name { font-size: 15px; font-weight: 500; color: var(--text); }
  .suggestion .meta { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .suggestion .years { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .suggestion .flag { font-size: 18px; }

  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: var(--muted);
    padding: 0 4px;
  }
  .meta-row a { color: var(--accent); text-decoration: none; cursor: pointer; font-weight: 500; }
  .meta-row a:hover { text-decoration: underline; }
  .meta-row .pips { display: inline-flex; align-items: center; gap: 6px; }
  .meta-row .pip {
    display: inline-block;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--line);
    border: 2px solid transparent;
    transition: background 200ms ease, transform 200ms ease;
  }
  .meta-row .pip.used {
    background: var(--bad);
    border-color: var(--bad);
    animation: pip-pop 280ms ease;
  }
  @keyframes pip-pop {
    0%   { transform: scale(0.6); }
    60%  { transform: scale(1.2); }
    100% { transform: scale(1); }
  }
  .meta-row .pips-count { color: var(--text-soft); font-weight: 600; font-size: 13px; margin-left: 4px; }

  .guesses {
    background: var(--card);
    border-radius: 16px;
    padding: 14px 18px;
    box-shadow: var(--shadow);
  }
  .guesses .heading {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    font-weight: 700;
  }
  .guess-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    font-size: 14px;
    border-bottom: 1px solid var(--line);
  }
  .guess-row:last-child { border-bottom: none; }
  .guess-row .x {
    color: var(--bad);
    background: var(--bad-soft);
    width: 22px; height: 22px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 12px;
    flex-shrink: 0;
  }
  .guess-row .name { color: var(--text-soft); }

  .reveal-banner {
    border-radius: 14px;
    padding: 18px 20px;
    font-size: 16px;
    font-weight: 600;
    text-align: center;
    animation: banner-in 480ms cubic-bezier(0.2, 0.9, 0.3, 1.4);
  }
  .reveal-banner.good { background: var(--good-soft); color: var(--good); border: 2px solid var(--good); }
  .reveal-banner.bad { background: var(--bad-soft); color: var(--bad); border: 2px solid var(--bad); }
  .reveal-banner .name-line { font-size: 22px; font-weight: 800; letter-spacing: -0.01em; }
  .reveal-banner .score-line { font-size: 13px; font-weight: 500; opacity: 0.85; margin-top: 6px; }
  .reveal-banner.first-try { animation: banner-in 480ms cubic-bezier(0.2, 0.9, 0.3, 1.4), banner-pulse 1400ms ease 480ms 2; }
  @keyframes banner-in {
    0%   { opacity: 0; transform: translateY(12px) scale(0.96); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes banner-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(15, 122, 62, 0.0); }
    50%      { box-shadow: 0 0 0 10px rgba(15, 122, 62, 0.18); }
  }
  /* Confetti-ish sparkles around win banner */
  .sparkles { position: absolute; pointer-events: none; inset: -20px; overflow: hidden; }
  .sparkle {
    position: absolute;
    width: 8px; height: 8px;
    border-radius: 50%;
    opacity: 0;
    animation: sparkle 1100ms ease forwards;
  }
  @keyframes sparkle {
    0%   { opacity: 0; transform: translate(0,0) scale(0); }
    20%  { opacity: 1; }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(1.2); }
  }

  .bio { display: none; margin-top: 22px; }
  .bio.show { display: block; }
  .bio .row { background: var(--card); border-radius: 16px; padding: 18px 20px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .bio .row h3 { margin: 0 0 10px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); font-weight: 700; }
  .bio .row p, .bio .row li { font-size: 15px; line-height: 1.5; margin: 4px 0; color: var(--text-soft); }
  .bio .row ul { margin: 0; padding-left: 18px; }
  .bio .row .name-line { font-size: 30px; font-weight: 700; line-height: 1.1; margin-bottom: 4px; color: var(--text); letter-spacing: -0.01em; }
  .bio .row .sub { font-size: 13px; color: var(--muted); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { background: var(--accent-soft); color: var(--accent); padding: 4px 12px; border-radius: 999px; font-size: 13px; font-weight: 500; }

  .footer {
    text-align: center;
    color: var(--text-soft);
    font-size: 12px;
    padding: 32px 0 12px;
    border-top: 1px solid var(--line);
    margin-top: 24px;
  }
  .footer strong { color: var(--text); }
  .footer .sep { color: var(--line); margin: 0 6px; }

  /* Empty-state tip card (shown before any guess) */
  .tip-card {
    background: var(--card);
    border: 1px dashed var(--line);
    border-radius: 14px;
    padding: 14px 18px;
    color: var(--text-soft);
    font-size: 13px;
    line-height: 1.5;
    margin-top: 4px;
  }
  .tip-card .tip-label {
    color: var(--accent);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.1em;
    margin-right: 8px;
  }

  /* Image skeleton (while loading) */
  .image-card.loading::after {
    content: "";
    position: absolute; inset: 0;
    background: linear-gradient(110deg, var(--card) 0%, var(--card-hover) 50%, var(--card) 100%);
    background-size: 200% 100%;
    animation: skeleton 1400ms linear infinite;
  }
  .image-card.loading img { opacity: 0; }
  @keyframes skeleton { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }

  /* Slide-in for newly added clue */
  .clue-enter { animation: clue-in 380ms ease; }
  @keyframes clue-in {
    0%   { opacity: 0; transform: translateY(-6px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* Share button — bigger, with icon */
  .share-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 16px;
    border: none;
    background: var(--accent);
    color: #fff;
    border-radius: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 12px rgba(15, 122, 62, 0.25);
    transition: transform 120ms ease, box-shadow 120ms ease;
    margin-top: 14px;
  }
  .share-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(15, 122, 62, 0.32); }
  .share-btn:active { transform: translateY(0); }
  .stats-card { background: var(--card); border-radius: 16px; padding: 18px 20px; box-shadow: var(--shadow); margin-top: 14px; }
  .stats-card .heading { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; font-weight: 700; }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 18px; }
  .stat-cell { text-align: center; }
  .stat-cell .v { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-cell .l { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; font-weight: 600; }
  .dist-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 13px; color: var(--text-soft); }
  .dist-row .label { width: 16px; text-align: right; color: var(--muted); }
  .dist-row .bar { flex: 0 0 auto; min-width: 20px; height: 22px; border-radius: 4px; background: var(--line); display: flex; align-items: center; justify-content: flex-end; padding: 0 6px; color: var(--text); font-size: 12px; font-weight: 600; }
  .dist-row .bar.filled { background: var(--accent); color: #fff; }
  .dist-row .bar.today { background: var(--accent); color: #fff; box-shadow: 0 0 0 2px var(--accent-soft); }
  .dist-row .empty { color: var(--muted); font-size: 12px; }

</style>
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <span class="brand-icon">⚽</span>
        <h1>It's good to hear the name</h1>
      </div>
      <div class="sub-row">
        <span class="day-badge" id="dayBadge">DAY #1</span>
        <span class="date" id="dateLabel"></span>
      </div>
    </header>

    <div class="layout">
      <div id="image" class="image-card loading">
        <img id="silhouette" src="" alt="silhouette">
        <img id="photo" class="photo" src="" alt="photo">
      </div>

      <div class="game">
        <div id="question" class="question">
          <div id="clueList"></div>
        </div>

        <div class="input-wrap">
          <div id="suggestions" class="suggestions"></div>
          <input id="guessInput" type="text" placeholder="Type a footballer's name…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
        </div>

        <div class="meta-row">
          <span class="pips" id="pips"></span>
          <a id="revealLink">Bottle it</a>
        </div>

        <div id="tipCard" class="tip-card">
          <span class="tip-label">HOW TO PLAY</span>Type a footballer's name above. You get 5 guesses and a new clue each time you're wrong. New player every day.
        </div>

        <div id="guessesPanel" class="guesses" style="display:none">
          <div class="heading">Previous guesses</div>
          <div id="guessesList"></div>
        </div>

        <div id="result" style="display:none"></div>
      </div>
    </div>

    <div id="bio" class="bio"></div>

    <div class="footer">
      <strong>It's good to hear the name</strong><span class="sep">·</span>Wordle for niche footballers<br>
      <span style="color:var(--muted)">made by Bradshaw · share with mates</span>
    </div>
  </div>

<script src="players.js?v=27"></script>
<script src="bios.js?v=26"></script>
<script>
(() => {
  const ALL_PLAYERS = window.PLAYERS;
  const APPROVED = ALL_PLAYERS.filter(p => p.approved);
  const BIOS = window.BIOS || {};
  const MAX_GUESSES = 5;

  const $ = (id) => document.getElementById(id);


  // One player a day, picked by date — same player worldwide.
  // Fixed epoch: 2026-05-05 = day 0 = PLAYERS[0]. Tomorrow = PLAYERS[1]. Etc.
  // ?player=<id> is preserved for testing (any of the 32).
  const params = new URLSearchParams(location.search);
  const pinId = params.get("player");
  const pool = APPROVED.length > 0 ? APPROVED : ALL_PLAYERS;
  const EPOCH_DAY = Math.floor(Date.UTC(2026, 4, 5) / 86400000);
  const today = Math.floor(Date.now() / 86400000);

  // ---- Stats (localStorage) ----
  const STATS_KEY = "gthn_stats_v1";
  const defaultStats = () => ({
    played: 0, won: 0,
    currentStreak: 0, maxStreak: 0,
    distribution: [0, 0, 0, 0, 0, 0], // 1st, 2nd, 3rd, 4th, 5th, lost
    lastWonDay: -999,
    lastResultDay: -999,
    lastResult: null, // {won, attempt}
  });
  function loadStats() {
    try { return Object.assign(defaultStats(), JSON.parse(localStorage.getItem(STATS_KEY)) || {}); }
    catch { return defaultStats(); }
  }
  function saveStats(s) { try { localStorage.setItem(STATS_KEY, JSON.stringify(s)); } catch {} }
  function recordResult(won, attempt) {
    const s = loadStats();
    if (s.lastResultDay === today) return s; // already recorded today
    s.played++;
    if (won) {
      s.won++;
      s.distribution[Math.min(attempt, 5) - 1]++;
      s.currentStreak = (today - s.lastWonDay === 1) ? (s.currentStreak + 1) : 1;
      if (s.currentStreak > s.maxStreak) s.maxStreak = s.currentStreak;
      s.lastWonDay = today;
    } else {
      s.distribution[5]++;
      s.currentStreak = 0;
    }
    s.lastResultDay = today;
    s.lastResult = { won, attempt };
    saveStats(s);
    return s;
  }
  function renderStats(s) {
    const winPct = s.played ? Math.round((s.won / s.played) * 100) : 0;
    const max = Math.max(1, ...s.distribution);
    const labels = ["1", "2", "3", "4", "5", "X"];
    const todayWon = s.lastResultDay === today && s.lastResult && s.lastResult.won;
    const todayLost = s.lastResultDay === today && s.lastResult && !s.lastResult.won;
    const todayBar = todayWon ? Math.min(s.lastResult.attempt, 5) - 1 : (todayLost ? 5 : -1);
    let dist = "";
    for (let i = 0; i < 6; i++) {
      const n = s.distribution[i];
      const w = n === 0 ? 20 : Math.round(20 + (n / max) * 240);
      const cls = i === todayBar ? "bar today" : (n > 0 ? "bar filled" : "bar");
      dist += `<div class="dist-row"><span class="label">${labels[i]}</span><div class="${cls}" style="width:${w}px">${n > 0 ? n : ""}</div></div>`;
    }
    return `
      <div class="stats-card">
        <div class="heading">Your stats</div>
        <div class="stat-grid">
          <div class="stat-cell"><div class="v">${s.played}</div><div class="l">Played</div></div>
          <div class="stat-cell"><div class="v">${winPct}%</div><div class="l">Win</div></div>
          <div class="stat-cell"><div class="v">${s.currentStreak}</div><div class="l">Streak</div></div>
          <div class="stat-cell"><div class="v">${s.maxStreak}</div><div class="l">Best</div></div>
        </div>
        <div style="font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:700">Guess distribution</div>
        ${dist}
      </div>`;
  }
  const offset = today - EPOCH_DAY;
  const todayIndex = ((offset % pool.length) + pool.length) % pool.length;
  const player = (pinId && ALL_PLAYERS.find(p => p.id === pinId)) || pool[todayIndex];

  // Lazily-loaded big database (~3.4MB). Until it loads, fall back to PLAYERS.
  let allNames = ALL_PLAYERS.map(p => ({ n: p.name, f: p.flag, y: p.years || "" }));
  fetch("names.json?v=26")
    .then(r => r.json())
    .then(big => {
      const seen = new Set(allNames.map(e => e.n.toLowerCase()));
      for (const e of big) {
        const k = e.n.toLowerCase();
        if (!seen.has(k)) { seen.add(k); allNames.push(e); }
      }
      // Alphabetise so our 27 named players don't always surface at the top.
      // (Without this, prefix matches return our players first because they were added first.)
      allNames.sort((a, b) => a.n.toLowerCase().localeCompare(b.n.toLowerCase()));
      if (guessInput && guessInput.value) debouncedRenderSuggestions();
    })
    .catch(() => {});

  let wrongGuesses = [];
  let revealed = false;
  let currentClueIndex = 0;

  const silhouette = $("silhouette"), photo = $("photo"), imageCard = $("image");
  const clueList = $("clueList");
  const guessInput = $("guessInput"), suggestionsBox = $("suggestions");
  const guessesPanel = $("guessesPanel"), guessesList = $("guessesList");
  const pips = $("pips"), revealLink = $("revealLink"), result = $("result");
  const dateLabel = $("dateLabel"), bio = $("bio");

  silhouette.src = `silhouettes/${player.id}.jpg`;
  photo.src = `images/${player.id}.jpg`;
  // Set the image card's aspect ratio to match the silhouette's natural dimensions —
  // means no zoom (object-fit: cover fits exactly) and no letterbox bars.
  function onSilLoaded() {
    if (silhouette.naturalWidth && silhouette.naturalHeight) {
      imageCard.style.aspectRatio = `${silhouette.naturalWidth} / ${silhouette.naturalHeight}`;
    }
    imageCard.classList.remove("loading");
  }
  if (silhouette.complete && silhouette.naturalWidth > 0) onSilLoaded();
  else silhouette.addEventListener("load", onSilLoaded, { once: true });
  // Day badge: how many days since the epoch (1-indexed for display)
  const dayNumber = (today - EPOCH_DAY) + 1;
  document.getElementById("dayBadge").textContent = `DAY #${dayNumber}`;
  dateLabel.textContent = new Date().toLocaleDateString(undefined, { weekday: "long", day: "numeric", month: "long" });
  renderClues();
  renderPips();

  function renderClues() {
    const upTo = currentClueIndex; // 0-based index of latest revealed
    let html = "";
    for (let i = 0; i <= upTo && i < player.clues.length; i++) {
      const isLatest = i === upTo;
      // Only animate the LATEST clue (otherwise everything would re-animate every render)
      const cls = isLatest && upTo > 0 ? "clue-enter" : "";
      html += `<div class="${cls}" style="padding:10px 0${i > 0 ? ';border-top:1px solid var(--line)' : ''}">
        <div style="text-transform:uppercase;font-size:11px;letter-spacing:0.12em;color:var(--accent);margin-bottom:6px;font-weight:700">Clue ${i + 1}</div>
        <div style="font-size:${isLatest ? '17' : '15'}px;line-height:1.5;color:${isLatest ? 'var(--text)' : 'var(--text-soft)'}">${player.clues[i]}</div>
      </div>`;
    }
    clueList.innerHTML = html;
  }

  function normalize(s) {
    return (s || "").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "").replace(/[^a-z0-9 ]/g, "").trim();
  }

  function isCorrect(guessName) {
    const g = normalize(guessName);
    if (!g) return false;
    if (g === normalize(player.name)) return true;
    return (player.aliases || []).some(a => normalize(a) === g);
  }

  function renderPips() {
    let html = "";
    for (let i = 0; i < MAX_GUESSES; i++) {
      html += `<span class="pip ${i < wrongGuesses.length ? "used" : ""}"></span>`;
    }
    const remaining = MAX_GUESSES - wrongGuesses.length;
    html += `<span class="pips-count">${remaining} left</span>`;
    pips.innerHTML = html;
    // Hide tip card once they start guessing
    const tip = document.getElementById("tipCard");
    if (tip) tip.style.display = wrongGuesses.length > 0 || revealed ? "none" : "";
  }

  let debounceTimer = null;
  let suggestionsReady = 0;

  function renderSuggestions() {
    if (revealed) { suggestionsBox.classList.remove("open"); return; }
    const q = normalize(guessInput.value);
    if (q.length < 3) { suggestionsBox.classList.remove("open"); return; }
    const prefix = [], substring = [];
    for (const e of allNames) {
      const norm = normalize(e.n);
      if (norm.startsWith(q)) prefix.push(e);
      else if (norm.includes(q)) substring.push(e);
      if (prefix.length >= 8) break;
    }
    const matches = [...prefix, ...substring].slice(0, 8);
    if (matches.length < 3) { suggestionsBox.classList.remove("open"); return; }
    const newHtml = matches.map(e =>
      `<div class="suggestion" data-name="${e.n.replace(/"/g, '&quot;')}">
        <span class="name">${e.n}</span>
        <span class="meta">${e.y ? `<span class="years">${e.y}</span>` : ""}<span class="flag">${e.f || ""}</span></span>
      </div>`
    ).join("");
    if (suggestionsBox.innerHTML !== newHtml) {
      suggestionsBox.innerHTML = newHtml;
      suggestionsReady = Date.now() + 200;
    }
    suggestionsBox.classList.add("open");
  }

  function debouncedRenderSuggestions() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(renderSuggestions, 200);
  }

  function submitGuess(name) {
    if (revealed) return;
    if (isCorrect(name)) {
      revealAnswer(true);
    } else {
      const entry = allNames.find(e => normalize(e.n) === normalize(name)) || {};
      wrongGuesses.push({ name, flag: entry.f || "", years: entry.y || "" });
      guessInput.value = "";
      suggestionsBox.classList.remove("open");
      renderGuesses();
      renderPips();
      if (currentClueIndex < player.clues.length - 1 && wrongGuesses.length < MAX_GUESSES) {
        currentClueIndex++;
        renderClues();
      }
      if (wrongGuesses.length >= MAX_GUESSES) revealAnswer(false);
    }
  }

  function renderGuesses() {
    if (!wrongGuesses.length) { guessesPanel.style.display = "none"; return; }
    guessesPanel.style.display = "block";
    guessesList.innerHTML = wrongGuesses.map(g =>
      `<div class="guess-row">
        <span class="x">✕</span>
        <span class="name">${g.name}</span>
        <span style="margin-left:auto;display:flex;align-items:center;gap:8px">
          ${g.years ? `<span style="font-size:12px;color:var(--muted)">${g.years}</span>` : ""}
          <span>${g.flag || ""}</span>
        </span>
      </div>`
    ).join("");
  }

  function revealAnswer(correct) {
    revealed = true;
    imageCard.classList.add("revealed");
    guessInput.disabled = true;
    suggestionsBox.classList.remove("open");
    revealLink.style.display = "none";
    const allClues = player.clues.map((c, i) => `<div style="padding:6px 0;border-bottom:1px solid var(--line);font-size:14px;color:var(--text-soft)"><span style="color:var(--accent);font-weight:700">${i + 1}.</span> ${c}</div>`).join("");
    const cluesSeen = currentClueIndex + 1; // 0-based → count
    const annotatedClues = player.clues.map((c, i) => {
      const seen = i < cluesSeen;
      const opacity = seen ? "1" : "1";
      const tag = seen ? "" : `<span style="font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-soft);padding:2px 6px;border-radius:6px;margin-left:6px;letter-spacing:0.05em">MISSED</span>`;
      return `<div style="padding:10px 0;border-bottom:1px solid var(--line);font-size:15px;color:var(--text-soft);line-height:1.5;opacity:${opacity}">
        <span style="color:var(--accent);font-weight:700;margin-right:6px">${i + 1}.</span>${c}${tag}
      </div>`;
    }).join("");
    const attempt = wrongGuesses.length + (correct ? 1 : 0);
    const ordinal = (n) => {
      if (n === 1) return "1st"; if (n === 2) return "2nd"; if (n === 3) return "3rd";
      return `${n}th`;
    };
    const stats = recordResult(correct, attempt);
    lastRevealAttempt = attempt;
    lastRevealCorrect = correct;
    afterReveal(stats);
    result.style.display = "block";
    // Hide the now-irrelevant play UI
    const inputWrap = document.querySelector(".input-wrap");
    if (inputWrap) inputWrap.style.display = "none";
    const metaRow = document.querySelector(".meta-row");
    if (metaRow) metaRow.style.display = "none";
    const tip = document.getElementById("tipCard");
    if (tip) tip.style.display = "none";
    renderBio();
    if (correct) addSparkles();
  }

  let lastRevealAttempt = 0;
  let lastRevealCorrect = false;

  function buildScoreLine() {
    const ord = (n) => n === 1 ? "1st" : n === 2 ? "2nd" : n === 3 ? "3rd" : `${n}th`;
    if (!lastRevealCorrect) return "";
    if (lastRevealAttempt === 1) return `<div class="score-line">First try 🎯</div>`;
    return `<div class="score-line">Nailed it on the ${ord(lastRevealAttempt)}</div>`;
  }

  function buildAnnotatedClues() {
    const seen = currentClueIndex + 1;
    return player.clues.map((c, i) => {
      const tag = i < seen ? "" : `<span style="font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-soft);padding:2px 6px;border-radius:6px;margin-left:6px;letter-spacing:0.05em">MISSED</span>`;
      return `<div style="padding:10px 0;border-bottom:1px solid var(--line);font-size:15px;color:var(--text-soft);line-height:1.5"><span style="color:var(--accent);font-weight:700;margin-right:6px">${i + 1}.</span>${c}${tag}</div>`;
    }).join("");
  }

  function afterReveal(stats) {
    if (!revealed) return;
    if (!stats) stats = loadStats();
    const scoreLine = buildScoreLine();
    const annotatedClues = buildAnnotatedClues();
    const bannerClass = lastRevealCorrect && lastRevealAttempt === 1 ? "good first-try" : (lastRevealCorrect ? "good" : "bad");
    const bannerLine = lastRevealCorrect
      ? `<div>✓ <span class="name-line">${player.name}</span></div>`
      : `<div>✕ It was <span class="name-line">${player.name}</span></div>`;
    result.innerHTML = `
      <div class="reveal-banner ${bannerClass}" style="position:relative">
        ${bannerLine}
        ${scoreLine}
        <div class="sparkles" id="sparkles"></div>
      </div>
      <div class="question" style="margin-top:14px">
        <div class="label">All 5 clues</div>
        ${annotatedClues}
      </div>
      ${renderStats(stats)}
      <button class="share-btn" id="shareBtn">📤 Share with mates</button>
      <div style="text-align:center;margin-top:18px;padding:12px;color:var(--muted);font-size:13px">Back tomorrow for a new face.</div>
    `;
    result.style.display = "block";
  }

  function addSparkles() {
    const host = document.getElementById("sparkles");
    if (!host) return;
    const colors = ["#0f7a3e", "#e8b13a", "#5fbf85", "#0a5e30", "#e89c3a"];
    for (let i = 0; i < 12; i++) {
      const s = document.createElement("span");
      s.className = "sparkle";
      s.style.background = colors[i % colors.length];
      s.style.left = "50%";
      s.style.top = "50%";
      const angle = (i / 12) * Math.PI * 2;
      const dist = 60 + Math.random() * 40;
      s.style.setProperty("--dx", `${Math.cos(angle) * dist}px`);
      s.style.setProperty("--dy", `${Math.sin(angle) * dist}px`);
      s.style.animationDelay = `${i * 30}ms`;
      host.appendChild(s);
    }
  }

  // ---- Share (Wordle-style: copies a spoiler-free result to the clipboard) ----
  function buildShareText() {
    const guesses = lastRevealCorrect
      ? `${lastRevealAttempt}/${MAX_GUESSES}`
      : `✕/${MAX_GUESSES}`;
    const grid = lastRevealCorrect
      ? "❌".repeat(lastRevealAttempt - 1) + "⚽"
      : "❌".repeat(MAX_GUESSES);
    return `⚽ It's good to hear the name — Day #${dayNumber}\n${guesses}  ${grid}\nbradshaw1992.github.io/good-to-hear-the-name`;
  }
  document.addEventListener("click", async (e) => {
    const btn = e.target && e.target.closest && e.target.closest("#shareBtn");
    if (btn) {
      const text = buildShareText();
      try {
        if (navigator.share) {
          await navigator.share({ text });
        } else {
          await navigator.clipboard.writeText(text);
          const original = btn.innerHTML;
          btn.innerHTML = "✓ Copied! Paste it in the chat";
          setTimeout(() => { btn.innerHTML = original; }, 2200);
        }
      } catch {}
    }
  });

  function renderBio() {
    const data = BIOS[player.id];
    if (!data) {
      bio.innerHTML = `<div class="row"><div class="name-line">${player.name}</div><div class="sub">${player.flag} ${player.country} · ${player.years || ""}</div></div>`;
    } else {
      const chips = (data.clubs || []).map(c => `<span class="chip">${c}</span>`).join("");
      const honoursList = (data.honours || []).map(h => `<li>${h}</li>`).join("");
      const factsList = (data.didYouKnow || []).map(f => `<li>${f}</li>`).join("");
      bio.innerHTML = `
        <div class="row">
          <div class="name-line">${player.name}</div>
          <div class="sub">${player.flag} ${data.position || ""} · ${data.yearsActive || player.years || ""}</div>
        </div>
        ${data.story ? `<div class="row"><h3>The story</h3><p>${data.story}</p></div>` : ""}
        ${chips ? `<div class="row"><h3>Notable clubs</h3><div class="chips">${chips}</div></div>` : ""}
        ${honoursList ? `<div class="row"><h3>Honours</h3><ul>${honoursList}</ul></div>` : ""}
        ${data.numbers ? `<div class="row"><h3>By the numbers</h3><p>${data.numbers}</p></div>` : ""}
        ${factsList ? `<div class="row"><h3>Did you know?</h3><ul>${factsList}</ul></div>` : ""}
      `;
    }
    bio.classList.add("show");
  }

  // ?demo=reveal — auto-reveals (used for store screenshots)
  // ?demo=correct — auto-wins on first try (used for store screenshots)
  // ?demo=mid — fakes 2 wrong guesses (3 clues visible)
  const demoMode = params.get("demo");
  if (demoMode) {
    // Disable CSS transitions in demo mode so screenshots capture final state
    const demoCss = document.createElement("style");
    demoCss.textContent = "*, *::before, *::after { animation-duration: 0ms !important; transition-duration: 0ms !important; }";
    document.head.appendChild(demoCss);
  }
  if (demoMode === "reveal") setTimeout(() => revealAnswer(false), 100);
  if (demoMode === "correct") setTimeout(() => submitGuess(player.name), 100);
  if (demoMode === "mid") setTimeout(() => {
    submitGuess("Wayne Rooney"); submitGuess("Steven Gerrard");
  }, 100);

  guessInput.addEventListener("input", debouncedRenderSuggestions);
  guessInput.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      const first = suggestionsBox.querySelector(".suggestion");
      if (first) submitGuess(first.dataset.name);
    } else if (e.key === "Escape") {
      suggestionsBox.classList.remove("open");
    }
  });
  suggestionsBox.addEventListener("click", e => {
    if (Date.now() < suggestionsReady) return;
    const el = e.target.closest(".suggestion");
    if (el) submitGuess(el.dataset.name);
  });
  revealLink.addEventListener("click", () => revealAnswer(false));
})();
</script>
</body>
</html>
