<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0f7a3e">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="GTHN">
<title>Good to hear the name…</title>
<style>
  :root {
    --bg: #f4efe6;
    --card: #ffffff;
    --card-hover: #f8f5ee;
    --line: #e6dfd0;
    --text: #14202e;
    --text-soft: #3a4858;
    --muted: #8a8676;
    --accent: #0f7a3e;
    --accent-soft: #d6ede0;
    --bad: #b03434;
    --bad-soft: #f5e1de;
    --good: #0f7a3e;
    --good-soft: #d6ede0;
    --shadow: 0 1px 2px rgba(20,32,46,0.04), 0 4px 14px rgba(20,32,46,0.06);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body { min-height: 100vh; min-height: 100dvh; }

  .app {
    max-width: 1100px;
    margin: 0 auto;
    padding: 18px 16px 32px;
  }

  header {
    text-align: center;
    margin-bottom: 18px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--line);
  }
  header h1 {
    margin: 0;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--text);
  }
  header .sub {
    margin-top: 4px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .layout {
    display: grid;
    grid-template-columns: 1fr;
    gap: 18px;
  }
  @media (min-width: 820px) {
    .layout { grid-template-columns: 1.05fr 1fr; align-items: start; }
  }

  .image-card {
    background: var(--card);
    border-radius: 18px;
    overflow: hidden;
    position: relative;
    box-shadow: var(--shadow);
    max-height: 60vh;
    /* aspect-ratio set dynamically via JS based on the silhouette's natural dimensions */
  }
  .image-card img {
    width: 100%; height: 100%; object-fit: cover; object-position: center;
    display: block;
    transition: opacity 700ms ease;
  }
  .image-card .photo { position: absolute; inset: 0; opacity: 0; }
  .image-card.revealed .photo { opacity: 1; }

  .game {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .question {
    background: var(--card);
    border-radius: 16px;
    padding: 18px 20px;
    box-shadow: var(--shadow);
    border-left: 3px solid var(--accent);
  }
  .question .label {
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin-bottom: 8px;
    font-weight: 700;
  }
  .question .text {
    font-size: 17px;
    line-height: 1.5;
    color: var(--text);
  }

  .input-wrap { position: relative; }
  input[type="text"] {
    width: 100%;
    background: var(--card);
    color: var(--text);
    border: 1.5px solid var(--line);
    border-radius: 14px;
    padding: 14px 18px;
    font-size: 16px;
    font-family: inherit;
    outline: none;
    box-shadow: var(--shadow);
    transition: border-color 150ms ease;
  }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"]::placeholder { color: var(--muted); }
  input[type="text"]:disabled { opacity: 0.5; }

  .suggestions {
    margin-bottom: 8px;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    overflow: hidden;
    max-height: 320px;
    overflow-y: auto;
    box-shadow: var(--shadow);
  }
  .suggestion {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    user-select: none;
    transition: background 100ms ease;
  }
  .suggestion:last-child { border-bottom: none; }
  .suggestion:hover, .suggestion:focus { background: var(--card-hover); }
  .suggestion .name { font-size: 15px; font-weight: 500; color: var(--text); }
  .suggestion .meta { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .suggestion .years { font-size: 12px; color: var(--muted); white-space: nowrap; }
  .suggestion .flag { font-size: 18px; }

  .meta-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: var(--muted);
    padding: 0 4px;
  }
  .meta-row a { color: var(--accent); text-decoration: none; cursor: pointer; font-weight: 500; }
  .meta-row a:hover { text-decoration: underline; }
  .meta-row .pip {
    display: inline-block;
    width: 9px; height: 9px;
    border-radius: 50%;
    background: var(--line);
    margin-right: 4px;
  }
  .meta-row .pip.used { background: var(--bad); }

  .guesses {
    background: var(--card);
    border-radius: 16px;
    padding: 14px 18px;
    box-shadow: var(--shadow);
  }
  .guesses .heading {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    font-weight: 700;
  }
  .guess-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    font-size: 14px;
    border-bottom: 1px solid var(--line);
  }
  .guess-row:last-child { border-bottom: none; }
  .guess-row .x {
    color: var(--bad);
    background: var(--bad-soft);
    width: 22px; height: 22px;
    border-radius: 50%;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 12px;
    flex-shrink: 0;
  }
  .guess-row .name { color: var(--text-soft); }

  .reveal-banner {
    border-radius: 14px;
    padding: 16px 20px;
    font-size: 16px;
    font-weight: 600;
    text-align: center;
  }
  .reveal-banner.good { background: var(--good-soft); color: var(--good); border: 1px solid var(--good); }
  .reveal-banner.bad { background: var(--bad-soft); color: var(--bad); border: 1px solid var(--bad); }

  .bio { display: none; margin-top: 22px; }
  .bio.show { display: block; }
  .bio .row { background: var(--card); border-radius: 16px; padding: 18px 20px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .bio .row h3 { margin: 0 0 10px; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); font-weight: 700; }
  .bio .row p, .bio .row li { font-size: 15px; line-height: 1.5; margin: 4px 0; color: var(--text-soft); }
  .bio .row ul { margin: 0; padding-left: 18px; }
  .bio .row .name-line { font-size: 30px; font-weight: 700; line-height: 1.1; margin-bottom: 4px; color: var(--text); letter-spacing: -0.01em; }
  .bio .row .sub { font-size: 13px; color: var(--muted); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { background: var(--accent-soft); color: var(--accent); padding: 4px 12px; border-radius: 999px; font-size: 13px; font-weight: 500; }

  .footer {
    text-align: center;
    color: var(--muted);
    font-size: 12px;
    padding: 28px 0 4px;
  }
  .stats-card { background: var(--card); border-radius: 16px; padding: 18px 20px; box-shadow: var(--shadow); margin-top: 14px; }
  .stats-card .heading { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; font-weight: 700; }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 18px; }
  .stat-cell { text-align: center; }
  .stat-cell .v { font-size: 26px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-cell .l { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-top: 4px; font-weight: 600; }
  .dist-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 13px; color: var(--text-soft); }
  .dist-row .label { width: 16px; text-align: right; color: var(--muted); }
  .dist-row .bar { flex: 0 0 auto; min-width: 20px; height: 22px; border-radius: 4px; background: var(--line); display: flex; align-items: center; justify-content: flex-end; padding: 0 6px; color: var(--text); font-size: 12px; font-weight: 600; }
  .dist-row .bar.filled { background: var(--accent); color: #fff; }
  .dist-row .bar.today { background: var(--accent); color: #fff; box-shadow: 0 0 0 2px var(--accent-soft); }
  .dist-row .empty { color: var(--muted); font-size: 12px; }

  /* Display-name pill in header */
  .name-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-soft);
    color: var(--accent);
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    margin-top: 6px;
    font-family: inherit;
  }
  .name-pill:hover { background: var(--accent); color: #fff; }
  .name-pill .icon { font-size: 11px; opacity: 0.7; }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0; background: rgba(20,32,46,0.5);
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal {
    background: var(--card); border-radius: 18px; max-width: 380px; width: 100%;
    padding: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .modal h2 { margin: 0 0 8px; font-size: 20px; color: var(--text); }
  .modal p { margin: 0 0 16px; font-size: 14px; color: var(--text-soft); line-height: 1.5; }
  .modal input[type="text"] { margin-bottom: 12px; }
  .modal-actions { display: flex; gap: 8px; }
  .modal-btn {
    flex: 1; padding: 12px 16px; border-radius: 12px; font-size: 15px;
    font-weight: 600; border: none; cursor: pointer; font-family: inherit;
  }
  .modal-btn.primary { background: var(--accent); color: #fff; }
  .modal-btn.primary:hover { background: #0a5e30; }
  .modal-btn.primary:disabled { opacity: 0.5; cursor: default; }
  .modal-btn.secondary { background: var(--line); color: var(--text-soft); }

  /* Leaderboard */
  .lb-card { background: var(--card); border-radius: 16px; padding: 18px 20px; box-shadow: var(--shadow); margin-top: 14px; }
  .lb-card .heading { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; font-weight: 700; }
  .lb-row { display: grid; grid-template-columns: 28px 1fr auto; gap: 10px; padding: 10px 0; align-items: center; border-bottom: 1px solid var(--line); font-size: 14px; }
  .lb-row:last-child { border-bottom: none; }
  .lb-row .pos { color: var(--muted); font-weight: 600; text-align: center; font-size: 13px; }
  .lb-row .name { color: var(--text-soft); }
  .lb-row .score { font-weight: 600; color: var(--text); }
  .lb-row.you { background: var(--accent-soft); margin: 0 -8px; padding: 10px 8px; border-radius: 8px; border-bottom: none; }
  .lb-row.you .name, .lb-row.you .score, .lb-row.you .pos { color: var(--accent); }
  .lb-row.failed .score { color: var(--bad); }
  .lb-empty { color: var(--muted); font-size: 14px; text-align: center; padding: 16px 0; }
</style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Good to hear the name…</h1>
      <div class="sub" id="dateLabel"></div>
      <button id="namePill" class="name-pill" style="display:none"></button>
    </header>
    <div id="modal" class="modal-backdrop" style="display:none">
      <div class="modal">
        <h2 id="modalTitle">Pick a display name</h2>
        <p id="modalSubtitle">Other players will see this on the leaderboard. Up to 30 characters. You can change it later.</p>
        <input id="modalNameInput" type="text" maxlength="30" placeholder="e.g. Tom B.">
        <div class="modal-actions">
          <button id="modalSkip" class="modal-btn secondary">Skip</button>
          <button id="modalSave" class="modal-btn primary" disabled>Save</button>
        </div>
      </div>
    </div>

    <div class="layout">
      <div id="image" class="image-card">
        <img id="silhouette" src="" alt="silhouette">
        <img id="photo" class="photo" src="" alt="photo">
      </div>

      <div class="game">
        <div id="question" class="question">
          <div id="clueList"></div>
        </div>

        <div class="input-wrap">
          <div id="suggestions" class="suggestions" style="display:none"></div>
          <input id="guessInput" type="text" placeholder="Type a footballer's name…" autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
        </div>

        <div class="meta-row">
          <span id="pips"></span>
          <a id="revealLink">Reveal answer</a>
        </div>

        <div id="guessesPanel" class="guesses" style="display:none">
          <div class="heading">Previous guesses</div>
          <div id="guessesList"></div>
        </div>

        <div id="result" style="display:none"></div>
      </div>
    </div>

    <div id="bio" class="bio"></div>

    <div class="footer">A new player every day · share with mates</div>
  </div>

<script src="players.js?v=15"></script>
<script src="bios.js?v=15"></script>
<script>
(() => {
  const ALL_PLAYERS = window.PLAYERS;
  const APPROVED = ALL_PLAYERS.filter(p => p.approved);
  const BIOS = window.BIOS || {};
  const MAX_GUESSES = 5;

  // Supabase config
  const SUPABASE_URL = "https://bwohtrjkguveynfepqwi.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ3b2h0cmprZ3V2ZXluZmVwcXdpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NDQzNzksImV4cCI6MjA5MDUyMDM3OX0.Z0PwiN_EX_hNHyH4TT9K95SWlWyssUShxkV-0VasxpE";
  const SB_HEADERS = { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` };

  function getDeviceId() {
    let id = localStorage.getItem("gthn_device_id");
    if (!id) {
      id = (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36) + Date.now().toString(36)).replace(/-/g, "").slice(0, 32);
      localStorage.setItem("gthn_device_id", id);
    }
    return id;
  }
  function getDisplayName() { return localStorage.getItem("gthn_display_name"); }
  function setDisplayNameStorage(n) {
    if (n) localStorage.setItem("gthn_display_name", n);
    else localStorage.removeItem("gthn_display_name");
  }
  function hasDismissedNameModal() { return localStorage.getItem("gthn_name_skipped") === "1"; }
  function setDismissedNameModal() { localStorage.setItem("gthn_name_skipped", "1"); }

  async function submitScore(playerId, dayIndex, correct, attempt) {
    const name = getDisplayName();
    if (!name) return false;
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/scores`, {
        method: "POST",
        headers: { ...SB_HEADERS, "Content-Type": "application/json", Prefer: "return=minimal" },
        body: JSON.stringify({
          display_name: name.trim().slice(0, 30),
          device_id: getDeviceId(),
          player_id: playerId,
          day_index: dayIndex,
          attempts: correct ? attempt : null,
          correct,
        }),
      });
      return res.ok || res.status === 409; // 409 = already submitted today, fine
    } catch (e) { return false; }
  }

  async function fetchLeaderboard(dayIndex) {
    try {
      const url = `${SUPABASE_URL}/rest/v1/scores?day_index=eq.${dayIndex}&select=display_name,attempts,correct,created_at&order=correct.desc,attempts.asc.nullslast,created_at.asc&limit=100`;
      const res = await fetch(url, { headers: SB_HEADERS });
      return res.ok ? await res.json() : [];
    } catch (e) { return []; }
  }

  function renderLeaderboard(rows, myName) {
    if (!rows.length) {
      return `<div class="lb-card"><div class="heading">Today's leaderboard</div><div class="lb-empty">No scores yet today. Be the first.</div></div>`;
    }
    let html = `<div class="lb-card"><div class="heading">Today's leaderboard</div>`;
    rows.forEach((r, i) => {
      const isYou = myName && r.display_name.toLowerCase() === myName.toLowerCase();
      const score = r.correct
        ? `${r.attempts}/${MAX_GUESSES}`
        : `<span class="failed">✕</span>`;
      const cls = `lb-row${isYou ? ' you' : ''}${r.correct ? '' : ' failed'}`;
      html += `<div class="${cls}"><div class="pos">${i + 1}</div><div class="name">${escapeHtml(r.display_name)}${isYou ? ' (you)' : ''}</div><div class="score">${score}</div></div>`;
    });
    html += `</div>`;
    return html;
  }

  function escapeHtml(s) {
    return (s || "").replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
  }

  // ---- Name pill UI ----
  const namePill = $("namePill");
  function renderNamePill() {
    const n = getDisplayName();
    if (n) {
      namePill.innerHTML = `<span class="icon">👤</span><span>${escapeHtml(n)}</span>`;
      namePill.style.display = "inline-flex";
    } else {
      namePill.innerHTML = `<span class="icon">+</span><span>Add display name</span>`;
      namePill.style.display = "inline-flex";
    }
  }
  function $modal(id) { return document.getElementById(id); }
  function openNameModal() {
    const m = $("modal");
    const input = $("modalNameInput");
    const save = $("modalSave");
    input.value = getDisplayName() || "";
    save.disabled = !input.value.trim();
    m.style.display = "flex";
    setTimeout(() => input.focus(), 50);
  }
  function closeNameModal() { $("modal").style.display = "none"; }
  $("modalNameInput").addEventListener("input", e => {
    $("modalSave").disabled = !e.target.value.trim();
  });
  $("modalSave").addEventListener("click", async () => {
    const v = $("modalNameInput").value.trim().slice(0, 30);
    if (!v) return;
    setDisplayNameStorage(v);
    closeNameModal();
    renderNamePill();
    if (revealed) {
      afterReveal();
      await submitScore(player.id, today, lastRevealCorrect, lastRevealAttempt);
      await refreshLeaderboard();
    }
  });
  $("modalSkip").addEventListener("click", () => {
    setDismissedNameModal();
    closeNameModal();
  });
  namePill.addEventListener("click", openNameModal);

  // Show modal on first visit
  if (!getDisplayName() && !hasDismissedNameModal()) {
    openNameModal();
  }
  renderNamePill();

  // One player a day, picked by date — same player worldwide.
  // Fixed epoch: 2026-05-05 = day 0 = PLAYERS[0]. Tomorrow = PLAYERS[1]. Etc.
  // ?player=<id> is preserved for testing (any of the 32).
  const params = new URLSearchParams(location.search);
  const pinId = params.get("player");
  const pool = APPROVED.length > 0 ? APPROVED : ALL_PLAYERS;
  const EPOCH_DAY = Math.floor(Date.UTC(2026, 4, 5) / 86400000);
  const today = Math.floor(Date.now() / 86400000);

  // ---- Stats (localStorage) ----
  const STATS_KEY = "gthn_stats_v1";
  const defaultStats = () => ({
    played: 0, won: 0,
    currentStreak: 0, maxStreak: 0,
    distribution: [0, 0, 0, 0, 0, 0], // 1st, 2nd, 3rd, 4th, 5th, lost
    lastWonDay: -999,
    lastResultDay: -999,
    lastResult: null, // {won, attempt}
  });
  function loadStats() {
    try { return Object.assign(defaultStats(), JSON.parse(localStorage.getItem(STATS_KEY)) || {}); }
    catch { return defaultStats(); }
  }
  function saveStats(s) { try { localStorage.setItem(STATS_KEY, JSON.stringify(s)); } catch {} }
  function recordResult(won, attempt) {
    const s = loadStats();
    if (s.lastResultDay === today) return s; // already recorded today
    s.played++;
    if (won) {
      s.won++;
      s.distribution[Math.min(attempt, 5) - 1]++;
      s.currentStreak = (today - s.lastWonDay === 1) ? (s.currentStreak + 1) : 1;
      if (s.currentStreak > s.maxStreak) s.maxStreak = s.currentStreak;
      s.lastWonDay = today;
    } else {
      s.distribution[5]++;
      s.currentStreak = 0;
    }
    s.lastResultDay = today;
    s.lastResult = { won, attempt };
    saveStats(s);
    return s;
  }
  function renderStats(s) {
    const winPct = s.played ? Math.round((s.won / s.played) * 100) : 0;
    const max = Math.max(1, ...s.distribution);
    const labels = ["1", "2", "3", "4", "5", "X"];
    const todayWon = s.lastResultDay === today && s.lastResult && s.lastResult.won;
    const todayLost = s.lastResultDay === today && s.lastResult && !s.lastResult.won;
    const todayBar = todayWon ? Math.min(s.lastResult.attempt, 5) - 1 : (todayLost ? 5 : -1);
    let dist = "";
    for (let i = 0; i < 6; i++) {
      const n = s.distribution[i];
      const w = n === 0 ? 20 : Math.round(20 + (n / max) * 240);
      const cls = i === todayBar ? "bar today" : (n > 0 ? "bar filled" : "bar");
      dist += `<div class="dist-row"><span class="label">${labels[i]}</span><div class="${cls}" style="width:${w}px">${n > 0 ? n : ""}</div></div>`;
    }
    return `
      <div class="stats-card">
        <div class="heading">Your stats</div>
        <div class="stat-grid">
          <div class="stat-cell"><div class="v">${s.played}</div><div class="l">Played</div></div>
          <div class="stat-cell"><div class="v">${winPct}%</div><div class="l">Win</div></div>
          <div class="stat-cell"><div class="v">${s.currentStreak}</div><div class="l">Streak</div></div>
          <div class="stat-cell"><div class="v">${s.maxStreak}</div><div class="l">Best</div></div>
        </div>
        <div style="font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:700">Guess distribution</div>
        ${dist}
      </div>`;
  }
  const offset = today - EPOCH_DAY;
  const todayIndex = ((offset % pool.length) + pool.length) % pool.length;
  const player = (pinId && ALL_PLAYERS.find(p => p.id === pinId)) || pool[todayIndex];

  // Lazily-loaded big database (~3.4MB). Until it loads, fall back to PLAYERS.
  let allNames = ALL_PLAYERS.map(p => ({ n: p.name, f: p.flag, y: p.years || "" }));
  fetch("names.json?v=15")
    .then(r => r.json())
    .then(big => {
      const seen = new Set(allNames.map(e => e.n.toLowerCase()));
      for (const e of big) {
        const k = e.n.toLowerCase();
        if (!seen.has(k)) { seen.add(k); allNames.push(e); }
      }
      if (guessInput && guessInput.value) renderSuggestions();
    })
    .catch(() => {});

  let wrongGuesses = [];
  let revealed = false;
  let currentClueIndex = 0;

  const $ = id => document.getElementById(id);
  const silhouette = $("silhouette"), photo = $("photo"), imageCard = $("image");
  const clueList = $("clueList");
  const guessInput = $("guessInput"), suggestionsBox = $("suggestions");
  const guessesPanel = $("guessesPanel"), guessesList = $("guessesList");
  const pips = $("pips"), revealLink = $("revealLink"), result = $("result");
  const dateLabel = $("dateLabel"), bio = $("bio");

  silhouette.src = `silhouettes/${player.id}.jpg`;
  photo.src = `images/${player.id}.jpg`;
  // Set the image card's aspect ratio to match the silhouette's natural dimensions —
  // means no zoom (object-fit: cover fits exactly) and no letterbox bars.
  silhouette.addEventListener("load", () => {
    if (silhouette.naturalWidth && silhouette.naturalHeight) {
      imageCard.style.aspectRatio = `${silhouette.naturalWidth} / ${silhouette.naturalHeight}`;
    }
  }, { once: true });
  dateLabel.textContent = new Date().toLocaleDateString(undefined, { weekday: "long", day: "numeric", month: "long" });
  renderClues();
  renderPips();

  function renderClues() {
    const upTo = currentClueIndex; // 0-based index of latest revealed
    let html = "";
    for (let i = 0; i <= upTo && i < player.clues.length; i++) {
      const isLatest = i === upTo;
      html += `<div style="padding:10px 0${i > 0 ? ';border-top:1px solid var(--line)' : ''}">
        <div style="text-transform:uppercase;font-size:11px;letter-spacing:0.12em;color:var(--accent);margin-bottom:6px;font-weight:700">Clue ${i + 1}</div>
        <div style="font-size:${isLatest ? '17' : '15'}px;line-height:1.5;color:${isLatest ? 'var(--text)' : 'var(--text-soft)'}">${player.clues[i]}</div>
      </div>`;
    }
    clueList.innerHTML = html;
  }

  function normalize(s) {
    return (s || "").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g, "").replace(/[^a-z0-9 ]/g, "").trim();
  }

  function isCorrect(guessName) {
    const g = normalize(guessName);
    if (!g) return false;
    if (g === normalize(player.name)) return true;
    return (player.aliases || []).some(a => normalize(a) === g);
  }

  function renderPips() {
    let html = "";
    for (let i = 0; i < MAX_GUESSES; i++) {
      html += `<span class="pip ${i < wrongGuesses.length ? "used" : ""}"></span>`;
    }
    html += ` <span style="margin-left:6px">${wrongGuesses.length} / ${MAX_GUESSES} guesses</span>`;
    pips.innerHTML = html;
  }

  function renderSuggestions() {
    if (revealed) { suggestionsBox.style.display = "none"; return; }
    const q = normalize(guessInput.value);
    if (q.length < 2) { suggestionsBox.style.display = "none"; suggestionsBox.innerHTML = ""; return; }
    const prefix = [], substring = [];
    for (const e of allNames) {
      const norm = normalize(e.n);
      if (norm.startsWith(q)) prefix.push(e);
      else if (norm.includes(q)) substring.push(e);
      if (prefix.length >= 8) break;
    }
    const matches = [...prefix, ...substring].slice(0, 8);
    if (!matches.length) { suggestionsBox.style.display = "none"; return; }
    suggestionsBox.innerHTML = matches.map(e =>
      `<div class="suggestion" data-name="${e.n.replace(/"/g, '&quot;')}">
        <span class="name">${e.n}</span>
        <span class="meta">${e.y ? `<span class="years">${e.y}</span>` : ""}<span class="flag">${e.f || ""}</span></span>
      </div>`
    ).join("");
    suggestionsBox.style.display = "block";
  }

  function submitGuess(name) {
    if (revealed) return;
    if (isCorrect(name)) {
      revealAnswer(true);
    } else {
      const entry = allNames.find(e => normalize(e.n) === normalize(name)) || {};
      wrongGuesses.push({ name, flag: entry.f || "", years: entry.y || "" });
      guessInput.value = "";
      suggestionsBox.style.display = "none";
      renderGuesses();
      renderPips();
      if (currentClueIndex < player.clues.length - 1 && wrongGuesses.length < MAX_GUESSES) {
        currentClueIndex++;
        renderClues();
      }
      if (wrongGuesses.length >= MAX_GUESSES) revealAnswer(false);
    }
  }

  function renderGuesses() {
    if (!wrongGuesses.length) { guessesPanel.style.display = "none"; return; }
    guessesPanel.style.display = "block";
    guessesList.innerHTML = wrongGuesses.map(g =>
      `<div class="guess-row">
        <span class="x">✕</span>
        <span class="name">${g.name}</span>
        <span style="margin-left:auto;display:flex;align-items:center;gap:8px">
          ${g.years ? `<span style="font-size:12px;color:var(--muted)">${g.years}</span>` : ""}
          <span>${g.flag || ""}</span>
        </span>
      </div>`
    ).join("");
  }

  function revealAnswer(correct) {
    revealed = true;
    imageCard.classList.add("revealed");
    guessInput.disabled = true;
    suggestionsBox.style.display = "none";
    revealLink.style.display = "none";
    const allClues = player.clues.map((c, i) => `<div style="padding:6px 0;border-bottom:1px solid var(--line);font-size:14px;color:var(--text-soft)"><span style="color:var(--accent);font-weight:700">${i + 1}.</span> ${c}</div>`).join("");
    const cluesSeen = currentClueIndex + 1; // 0-based → count
    const annotatedClues = player.clues.map((c, i) => {
      const seen = i < cluesSeen;
      const opacity = seen ? "1" : "1";
      const tag = seen ? "" : `<span style="font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-soft);padding:2px 6px;border-radius:6px;margin-left:6px;letter-spacing:0.05em">MISSED</span>`;
      return `<div style="padding:10px 0;border-bottom:1px solid var(--line);font-size:15px;color:var(--text-soft);line-height:1.5;opacity:${opacity}">
        <span style="color:var(--accent);font-weight:700;margin-right:6px">${i + 1}.</span>${c}${tag}
      </div>`;
    }).join("");
    const attempt = wrongGuesses.length + (correct ? 1 : 0);
    const ordinal = (n) => {
      if (n === 1) return "1st"; if (n === 2) return "2nd"; if (n === 3) return "3rd";
      return `${n}th`;
    };
    const scoreLine = correct
      ? `<div style="font-size:13px;font-weight:500;opacity:0.85;margin-top:4px">${attempt === 1 ? "First try 🎯" : `Got it on your ${ordinal(attempt)} attempt`}</div>`
      : "";
    const stats = recordResult(correct, attempt);
    lastRevealAttempt = attempt;
    lastRevealCorrect = correct;
    afterReveal(stats, scoreLine, annotatedClues);
    result.style.display = "block";
    renderBio();
    // Fire-and-forget: submit score + refresh leaderboard
    (async () => {
      await submitScore(player.id, today, correct, attempt);
      await refreshLeaderboard();
    })();
  }

  let lastRevealAttempt = 0;
  let lastRevealCorrect = false;

  function afterReveal(stats, scoreLine, annotatedClues) {
    if (!revealed) return;
    if (!stats) stats = loadStats();
    if (scoreLine == null) {
      const ord = (n) => n === 1 ? "1st" : n === 2 ? "2nd" : n === 3 ? "3rd" : `${n}th`;
      scoreLine = lastRevealCorrect
        ? `<div style="font-size:13px;font-weight:500;opacity:0.85;margin-top:4px">${lastRevealAttempt === 1 ? "First try 🎯" : `Got it on your ${ord(lastRevealAttempt)} attempt`}</div>`
        : "";
    }
    if (annotatedClues == null) {
      const seen = currentClueIndex + 1;
      annotatedClues = player.clues.map((c, i) => {
        const tag = i < seen ? "" : `<span style="font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-soft);padding:2px 6px;border-radius:6px;margin-left:6px;letter-spacing:0.05em">MISSED</span>`;
        return `<div style="padding:10px 0;border-bottom:1px solid var(--line);font-size:15px;color:var(--text-soft);line-height:1.5"><span style="color:var(--accent);font-weight:700;margin-right:6px">${i + 1}.</span>${c}${tag}</div>`;
      }).join("");
    }
    const lbContainer = `<div id="leaderboardContainer">${getDisplayName()
      ? `<div class="lb-card"><div class="heading">Today's leaderboard</div><div class="lb-empty">Loading…</div></div>`
      : `<div class="lb-card"><div class="heading">Today's leaderboard</div><div class="lb-empty">Add a display name above to join the leaderboard.</div></div>`}</div>`;
    result.innerHTML = `
      <div class="reveal-banner ${lastRevealCorrect ? 'good' : 'bad'}">
        <div>${lastRevealCorrect ? `✓ Correct — ${player.name}` : `✕ It was ${player.name}`}</div>
        ${scoreLine}
      </div>
      <div class="question" style="margin-top:14px">
        <div class="label">All 5 clues</div>
        ${annotatedClues}
      </div>
      ${renderStats(stats)}
      ${lbContainer}
      <div style="text-align:center;margin-top:18px;padding:12px;color:var(--muted);font-size:13px">Come back tomorrow for the next player.</div>
    `;
    result.style.display = "block";
  }

  async function refreshLeaderboard() {
    const c = document.getElementById("leaderboardContainer");
    if (!c) return;
    const rows = await fetchLeaderboard(today);
    c.innerHTML = renderLeaderboard(rows, getDisplayName());
  }

  function renderBio() {
    const data = BIOS[player.id];
    if (!data) {
      bio.innerHTML = `<div class="row"><div class="name-line">${player.name}</div><div class="sub">${player.flag} ${player.country} · ${player.years || ""}</div></div>`;
    } else {
      const chips = (data.clubs || []).map(c => `<span class="chip">${c}</span>`).join("");
      const honoursList = (data.honours || []).map(h => `<li>${h}</li>`).join("");
      const factsList = (data.didYouKnow || []).map(f => `<li>${f}</li>`).join("");
      bio.innerHTML = `
        <div class="row">
          <div class="name-line">${player.name}</div>
          <div class="sub">${player.flag} ${data.position || ""} · ${data.yearsActive || player.years || ""}</div>
        </div>
        ${data.story ? `<div class="row"><h3>The story</h3><p>${data.story}</p></div>` : ""}
        ${chips ? `<div class="row"><h3>Notable clubs</h3><div class="chips">${chips}</div></div>` : ""}
        ${honoursList ? `<div class="row"><h3>Honours</h3><ul>${honoursList}</ul></div>` : ""}
        ${data.numbers ? `<div class="row"><h3>By the numbers</h3><p>${data.numbers}</p></div>` : ""}
        ${factsList ? `<div class="row"><h3>Did you know?</h3><ul>${factsList}</ul></div>` : ""}
      `;
    }
    bio.classList.add("show");
  }

  guessInput.addEventListener("input", renderSuggestions);
  guessInput.addEventListener("keydown", e => {
    if (e.key === "Enter") {
      const first = suggestionsBox.querySelector(".suggestion");
      if (first) submitGuess(first.dataset.name);
    } else if (e.key === "Escape") {
      suggestionsBox.style.display = "none";
    }
  });
  suggestionsBox.addEventListener("click", e => {
    const el = e.target.closest(".suggestion");
    if (el) submitGuess(el.dataset.name);
  });
  revealLink.addEventListener("click", () => revealAnswer(false));
})();
</script>
</body>
</html>
